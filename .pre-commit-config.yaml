repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        exclude: ^(example_molecules\.smi|tests/visual/baseline/)
      - id: end-of-file-fixer
        exclude: ^(docs/img/|tests/visual/baseline/)
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=2048"]
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Bumped from v0.5.0 — that release is over a year old and its
    # rules / format style diverge from current ruff, so files clean
    # locally fail the pre-commit hook AND the matching CI lint job.
    # Keep this in sync with the CI lint pin in .github/workflows/ci.yml.
    rev: v0.15.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
